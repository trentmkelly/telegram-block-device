[package]
name = "grammers-client"
version = "0.9.0"
authors = ["Lonami Exo <totufals@hotmail.com>"]
license = "MIT OR Apache-2.0"
description = """
A high level client to interact with Telegram's API.
"""
homepage = "https://codeberg.org/Lonami/grammers"
documentation = "https://docs.rs/grammers-client"
repository = "https://codeberg.org/Lonami/grammers"
keywords = ["mtproto", "telegram", "tl"]
categories = ["api-bindings"]
edition = "2024"

[features]
markdown = ["pulldown-cmark"]
html = ["html5ever"]
proxy = ["grammers-mtsender/proxy"]
parse_invite_link = ["url"]
fs = ["tokio/fs"]
default = ["fs"]

[dependencies]
chrono = "0.4.43"
futures-util = { version = "0.3.32", default-features = false, features = [
    "alloc"
] }
grammers-crypto = { path = "../grammers-crypto", version = "0.9.0" }
grammers-mtsender = { path = "../grammers-mtsender", version = "0.9.0" }
grammers-session = { path = "../grammers-session", version = "0.9.0", default-features = false }
grammers-tl-types = { path = "../grammers-tl-types", version = "0.9.0", features = [
    "tl-mtproto",
] }
html5ever = { version = "0.38.0", optional = true }
log = "0.4.29"
md5 = "0.8.0"
mime_guess = "2.0.5"
pin-project-lite = "0.2"
pulldown-cmark = { version = "0.13.0", default-features = false, optional = true }
tokio = { version = "1.49.0", default-features = false, features = [
    "rt", "macros"
] }
url = { version = "2.5.8", optional = true }

[dev-dependencies]
tokio = { version = "1.49.0", default-features = false, features = [
    "signal",
] }
simple_logger = { version = "5.2.0", default-features = false, features = [
    "colors",
] }
toml = "1.0.3"
