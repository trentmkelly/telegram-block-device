[package]
name = "grammers-tl-types"
version = "0.9.0"
authors = ["Lonami Exo <totufals@hotmail.com>"]
license = "MIT OR Apache-2.0"
description = """
Rust definitions for Telegram's API types and functions.
"""
homepage = "https://codeberg.org/Lonami/grammers"
documentation = "https://docs.rs/grammers-tl-types"
repository = "https://codeberg.org/Lonami/grammers"
keywords = ["telegram", "tl"]
categories = ["data-structures", "encoding"]
edition = "2024"
include = ["build.rs", "src/*.rs", "tl/*.tl"]

[dependencies]
serde = { version = "~1.0", optional = true }
serde_derive = { version = "~1.0", optional = true }
serde_bytes = { version = "0.11.19", optional = true }

[build-dependencies]
grammers-tl-gen = { path = "../grammers-tl-gen", version = "0.9.0" }
grammers-tl-parser = { path = "../grammers-tl-parser", version = "1.2.1" }

[dev-dependencies]
toml = "1.0.3"

[features]
default = ["impl-debug", "impl-from-enum", "impl-from-type", "tl-api"]

deserializable-functions = []
impl-debug = []
impl-from-enum = []
impl-from-type = []
impl-serde = ["dep:serde", "dep:serde_derive", "dep:serde_bytes"]
tl-api = []
tl-mtproto = []
